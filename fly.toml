app = "tunn-serv"
primary_region = "qro" # Queretaro para latencia baja

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[services]]
  internal_port = 8080
  protocol = "tcp"
  [[services.ports]]
    port = 80
